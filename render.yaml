# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploys the app as a single Docker web service on the free plan.
# No database/Redis needed: the default profile uses in-memory H2 + cache.
services:
  - type: web
    # Must match the existing Render service so a Blueprint apply updates it in
    # place. *.onrender.com subdomains are globally unique; this one resolves to
    # https://url-shortener-api-1716.onrender.com
    name: url-shortener-api-1716
    runtime: docker
    plan: free
    region: singapore            # closest Render region to India; change if you prefer
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    autoDeploy: true             # redeploy on every push to the default branch
    envVars:
      # Optional. The app derives the public host from each request, so short
      # URLs are correct without this. Set it only to force a specific host
      # (e.g. a branded custom domain).
      - key: APP_BASE_URL
        sync: false
