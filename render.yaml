# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploys the app as a single Docker web service on the free plan.
# No database/Redis needed: the default profile uses in-memory H2 + cache.
services:
  - type: web
    name: url-shortener-api
    runtime: docker
    plan: free
    region: singapore            # closest Render region to India; change if you prefer
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    autoDeploy: true             # redeploy on every push to the default branch
    envVars:
      # Set this in the Render dashboard to your live URL after the first deploy
      # (e.g. https://url-shortener-api.onrender.com) so `shortUrl` reflects it.
      - key: APP_BASE_URL
        sync: false
